name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        toolchain: [stable]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/*
            !target/opencascade-sys
          key: cargo-${{ runner.os }}-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.toolchain }}-
      - name: Cache OpenCASCADE
        uses: actions/cache@v5
        with:
          path: |
            target/opencascade-sys/
          key: occt-${{ runner.os }}-${{ hashFiles('crates/opencascade-sys/**') }}
          restore-keys: |
            occt-${{ runner.os }}-
      - name: Build
        run: cargo build --verbose --workspace --all-features
      - name: Run tests
        run: cargo test --verbose --workspace --all-features -- --include-ignored

  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-make
        run: cargo install cargo-make
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/*
            !target/opencascade-sys
            !target/wasm-libcxx
          key: cargo-wasm-v2-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-wasm-v2-${{ runner.os }}-
      - name: Cache OpenCASCADE
        uses: actions/cache@v5
        with:
          path: |
            target/opencascade-sys/
          key: occt-wasm-v2-${{ runner.os }}-${{ hashFiles('crates/opencascade-sys/**') }}
      - name: Install LLVM 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
      - name: Run WASM tests
        env:
          CC_wasm32_unknown_unknown: clang-22
          CXX_wasm32_unknown_unknown: clang++-22
          AR_wasm32_unknown_unknown: llvm-ar-22
        run: cargo make test-wasm
